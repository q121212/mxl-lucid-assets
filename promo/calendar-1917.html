<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#ddd; font-family:'Montserrat',sans-serif; min-height:100vh; overflow-x:hidden; }
  .bg { position:fixed; top:0; left:0; width:100%; height:100%; opacity:.03; background:radial-gradient(circle at 30% 20%,#c00 0%,transparent 50%),radial-gradient(circle at 70% 80%,#333 0%,transparent 50%); z-index:0; pointer-events:none; }

  .container { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:40px 20px; }
  h1 { font-size:clamp(2rem,5vw,3rem); font-weight:900; color:#c00; text-align:center; margin-bottom:5px; letter-spacing:-1px; }

  .day-card:hover { border-color:#444; transform:translateY(-3px); }
  .day-card.revealed { border-color:#c00; background:#1a0a0a; cursor:default; }
  .day-card.today { border-color:#ff0000; box-shadow:0 0 25px rgba(204,0,0,.2); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow:0 0 25px rgba(204,0,0,.2); } 50% { box-shadow:0 0 50px rgba(204,0,0,.4); } }
  .day-card.locked { cursor:not-allowed; opacity:.4; }
  .day-card .day-num { font-size:2.5rem; font-weight:900; color:#333; }
  .day-card.revealed .day-num, .day-card.today .day-num { color:#c00; }

  .day-card .day-snippet { font-size:.8rem; color:#888; margin-top:8px; display:none; }
  .day-card.revealed .day-snippet { display:block; }
  .day-card .lock-icon { font-size:1.5rem; }

  @keyframes modalIn { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }

function getTodayUTC() {
  const now = new Date();
  return now.toISOString().split('T')[0];
}

function daysUntilRelease() {
  const today = new Date(getTodayUTC() + 'T00:00:00Z');
  const diff = RELEASE_DATE - today;
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function getDayIndex(dateStr) {
  return days.findIndex(d => d.date === dateStr);
}

function renderCalendar() {
  const today = getTodayUTC();
  const container = document.getElementById('calendar');
  const daysLeft = daysUntilRelease();
  document.getElementById('daysCount').textContent = daysLeft;

  container.innerHTML = days.map((day, idx) => {
    const dateObj = new Date(day.date + 'T00:00:00Z');
    const dateStr = dateObj.toLocaleDateString('ru', { day:'numeric', month:'short' });
    const isRevealed = day.date <= today;
    const isToday = day.date === today;
    const isLocked = day.date > today;

    let cls = 'day-card';
    if (isToday) cls += ' today';
    else if (isRevealed) cls += ' revealed';
    else cls += ' locked';

    return `<div class="${cls}" onclick="${isLocked ? '' : `openDay(${idx})`}" title="${day.date}">
      ${isLocked ? '<span class="lock-icon">🔒</span>' : ''}
      <span class="day-num">${isLocked ? '?' : day.emoji}</span>
      <span class="day-date">${dateStr}</span>
      ${isRevealed ? `<span class="day-snippet">${day.title}</span>` : ''}
    </div>`;
  }).join('');
}

function openDay(idx) {
  const day = days[idx];
  document.getElementById('modalTitle').textContent = `${day.emoji} ${day.title}`;
  document.getElementById('modalContent').innerHTML = day.content;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function share(platform) {
  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent('11 дней до релиза «Эх, яблочко» — открываю новый фрагмент истории каждый день. Присоединяйся!');
  const links = {
    tg: `https://t.me/share/url?url=${url}&text=${text}`,
    tw: `https://twitter.com/intent/tweet?text=${text}&url=${url}`
  };
  window.open(links[platform], '_blank', 'width=600,height=400');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const t = document.getElementById('toast');
    t.textContent = '🔗 Ссылка скопирована!';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  });
}

// Snow effect (for the "cold deck" atmosphere)
function createSnow() {
  const snow = document.getElementById('snow');
  for (let i = 0; i < 40; i++) {
    const flake = document.createElement('span');
    flake.className = 'snowflake';
    flake.textContent = ['·','•','❄','*'][Math.floor(Math.random() * 4)];
    flake.style.left = Math.random() * 100 + '%';
    flake.style.animationDuration = (Math.random() * 10 + 10) + 's';
    flake.style.animationDelay = Math.random() * 15 + 's';
    flake.style.fontSize = (Math.random() * 8 + 6) + 'px';
    snow.appendChild(flake);
  }
}

createSnow();
renderCalendar();

// Auto-open today's content if it hasn't been seen
const today = getTodayUTC();
const dayIdx = getDayIndex(today);
if (dayIdx >= 0 && !sessionStorage.getItem('opened_' + today)) {
  sessionStorage.setItem('opened_' + today, '1');
  setTimeout(() => openDay(dayIdx), 500);
}
</script>
